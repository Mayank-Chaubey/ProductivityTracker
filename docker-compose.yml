services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: productivity_db
      MYSQL_ROOT_PASSWORD: root@123
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/schema-v2.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/main/resources/db/02-demo-data.sql:/docker-entrypoint-initdb.d/02-demo-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot@123"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/productivity_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASSWORD: root@123
      APP_BASEURL: http://localhost:8081/ProductivityTracker
      MAIL_ENABLED: "false"
    ports:
      - "8081:8080"

volumes:
  mysql-data:
