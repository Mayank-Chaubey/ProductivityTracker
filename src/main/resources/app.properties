app.name=ProductivityTracker
app.environment=development
session.timeout.minutes=30
app.baseUrl=http://localhost:8080/ProductivityTracker

# Email is disabled by default. Set MAIL_ENABLED=true and SMTP values in env/properties for real delivery.
mail.enabled=false
mail.host=localhost
mail.port=587
mail.username=
mail.password=
mail.from=no-reply@productivitytracker.local
mail.starttls=true

# Scheduler cadence for reminder delivery checks.
reminders.scheduler.enabled=true
reminders.scheduler.interval.seconds=60
